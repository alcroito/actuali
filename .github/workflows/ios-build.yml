name: Build unsigned IPA

# Builds an unsigned .ipa on every PR and every published release.
#   PR      -> uploaded as a workflow-run artifact + a sticky comment links to it
#             (GitHub has no native "attach a file to a PR").
#   Release -> the .ipa is attached to the release as an asset.
# Unsigned means no Apple secrets are needed and fork PRs still build; the .ipa
# installs via re-signing tools (AltStore/Sideloadly), not on a stock device.

on:
  pull_request:
  release:
    types: [published]

concurrency:
  group: ios-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # upload release asset
  pull-requests: write   # post PR comment (same-repo PRs only)

jobs:
  build:
    runs-on: macos-26     # Xcode 26 / iOS 26.1 SDK; iOS 26 target can't build on macos-15
    outputs:
      label: ${{ steps.ver.outputs.label }}
      version: ${{ steps.meta.outputs.version }}
      buildVersion: ${{ steps.meta.outputs.buildVersion }}
      bundleId: ${{ steps.meta.outputs.bundleId }}
      minOS: ${{ steps.meta.outputs.minOS }}
      size: ${{ steps.meta.outputs.size }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Derive version label
        id: ver
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./scripts/ci/derive-version-label.sh

      - name: Build unsigned IPA
        id: pkg
        env:
          LABEL: ${{ steps.ver.outputs.label }}
        run: ./scripts/ci/build-unsigned-ipa.sh

      - name: Extract app metadata
        id: meta
        env:
          APP: ${{ steps.pkg.outputs.app }}
          IPA: ${{ steps.pkg.outputs.ipa }}
        run: ./scripts/ci/extract-app-metadata.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Actuali-${{ steps.ver.outputs.label }}-unsigned-ipa
          path: ${{ steps.pkg.outputs.ipa }}
          if-no-files-found: error

      # PR: sticky comment linking to the run's artifacts
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true   # fork PRs get a read-only token
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ios-build
          message: |
            Unsigned IPA built for this PR: **Actuali-${{ steps.ver.outputs.label }}-unsigned.ipa**
            Download it from the **Artifacts** section of
            [this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
            (Unsigned — install via AltStore/Sideloadly.)

      # Release: attach the IPA as a release asset
      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IPA: ${{ steps.pkg.outputs.ipa }}
        run: ./scripts/ci/upload-release-asset.sh

  # Release only: publish the AltStore source (source.json + landing page +
  # icon) to GitHub Pages. downloadURL points at the release asset uploaded by
  # `build`, so this must run after it.
  publish-source:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble AltStore Pages site
        env:
          SITE_DIR: _site
          BUNDLE_ID: ${{ needs.build.outputs.bundleId }}
          VERSION: ${{ needs.build.outputs.version }}
          BUILD_VERSION: ${{ needs.build.outputs.buildVersion }}
          MIN_OS: ${{ needs.build.outputs.minOS }}
          SIZE: ${{ needs.build.outputs.size }}
          LABEL: ${{ needs.build.outputs.label }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
          RELEASE_BODY: ${{ github.event.release.body }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          SERVER_URL: ${{ github.server_url }}
        run: ./scripts/ci/assemble-altstore-pages.sh

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
