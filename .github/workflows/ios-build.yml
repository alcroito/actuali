name: Build unsigned IPA

# Builds an unsigned .ipa on every PR and every published release.
#   PR      -> uploaded as a workflow-run artifact + a sticky comment links to it
#             (GitHub has no native "attach a file to a PR").
#   Release -> the .ipa is attached to the release as an asset.
# Unsigned means no Apple secrets are needed and fork PRs still build; the .ipa
# installs via re-signing tools (AltStore/Sideloadly), not on a stock device.

on:
  pull_request:
  release:
    types: [published]

concurrency:
  group: ios-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # upload release asset
  pull-requests: write   # post PR comment (same-repo PRs only)

jobs:
  build:
    runs-on: macos-26     # Xcode 26 / iOS 26.1 SDK; iOS 26 target can't build on macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Derive version label
        id: ver
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: ./scripts/ci/derive-version-label.sh

      - name: Build unsigned IPA
        id: pkg
        env:
          LABEL: ${{ steps.ver.outputs.label }}
        run: ./scripts/ci/build-unsigned-ipa.sh

      - uses: actions/upload-artifact@v4
        with:
          name: Actuali-${{ steps.ver.outputs.label }}-unsigned-ipa
          path: ${{ steps.pkg.outputs.ipa }}
          if-no-files-found: error

      # PR: sticky comment linking to the run's artifacts
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true   # fork PRs get a read-only token
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ios-build
          message: |
            Unsigned IPA built for this PR: **Actuali-${{ steps.ver.outputs.label }}-unsigned.ipa**
            Download it from the **Artifacts** section of
            [this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
            (Unsigned — install via AltStore/Sideloadly.)

      # Release: attach the IPA as a release asset
      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          IPA: ${{ steps.pkg.outputs.ipa }}
        run: ./scripts/ci/upload-release-asset.sh
