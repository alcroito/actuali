name: Manage awaiting-response label

# Tracks whose turn it is on an issue conversation. When the repo owner
# comments, the ball is in the other person's court, so the issue gets the
# "awaiting response" label. When anyone else comments, they've responded, so
# the label comes off. Bot comments (CI, github-actions, etc.) are ignored so
# they don't clear the label. Closed issues never get the label — no response
# is expected once the conversation is resolved.
#
# Any human comment also clears the "stale" label (applied by the daily
# stale-awaiting-response workflow), since the conversation clock has reset.
#
# Labels are created automatically on first use — no setup required.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  update-label:
    runs-on: ubuntu-latest
    # issue_comment also fires for PR comments; only act on real issues.
    if: ${{ !github.event.issue.pull_request }}
    steps:
      - name: Add or remove awaiting-response label
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          AUTHOR: ${{ github.event.sender.login }}
          AUTHOR_TYPE: ${{ github.event.sender.type }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_STATE: ${{ github.event.issue.state }}
          LABEL: awaiting response
          STALE_LABEL: stale
        run: |
          if [ "$AUTHOR_TYPE" = "Bot" ]; then
            echo "Ignoring bot comment from $AUTHOR."
            exit 0
          fi

          remove_label() {
            # 404 just means the label wasn't set; that's fine.
            gh api -X DELETE \
              "repos/$REPO/issues/$ISSUE_NUMBER/labels/$(jq -rn --arg l "$1" '$l|@uri')" \
              || echo "Label '$1' was not present."
          }

          echo "Human comment on issue #$ISSUE_NUMBER; clearing '$STALE_LABEL'."
          remove_label "$STALE_LABEL"

          if [ "$AUTHOR" = "$OWNER" ]; then
            if [ "$ISSUE_STATE" != "open" ]; then
              echo "Issue #$ISSUE_NUMBER is $ISSUE_STATE; not adding '$LABEL'."
              exit 0
            fi
            echo "Owner $AUTHOR commented; adding '$LABEL' to issue #$ISSUE_NUMBER."
            gh api "repos/$REPO/issues/$ISSUE_NUMBER/labels" -f "labels[]=$LABEL"
          else
            echo "$AUTHOR commented; removing '$LABEL' from issue #$ISSUE_NUMBER."
            remove_label "$LABEL"
          fi
