name: 🐛 Bug Report
description: Something isn't working right in Actuali
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: App Version / Build
      description: "Find this in the app: **Settings → About → Version / Build**"
      placeholder: "e.g. v1.0.6 Build 72"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you saw, and what you expected to see instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots / Additional Context
      description: Add screenshots or anything else that might help. You can drag and drop images here.
    validations:
      required: false
