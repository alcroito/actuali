name: 💡 Feature Request
description: Suggest an idea or improvement for Actuali
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the problem or friction you're running into.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or anything else that helps explain the idea.
    validations:
      required: false
